---
name: Lychee link checker

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 3 AM UTC to catch broken links
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  link-checker:
    name: Lychee link checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: |
          git submodule init
          git submodule update --recursive
          ls -la submodules/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create virtual environment
        run: |
          uv venv --clear .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install ".[docs]"
          uv pip install "submodules/hed-python[docs]"
          uv pip install "submodules/hed-vis[docs]"
          uv pip install "submodules/table-remodeler[docs]"
          uv pip install "submodules/hed-schemas[docs]"
          uv pip install "submodules/hed-matlab[docs]"
          uv pip install "submodules/hed-web[docs]"
          uv pip install "submodules/hed-tests[docs]"
          uv pip install "submodules/ndx-hed"

      - name: Build documentation with Sphinx
        run: |
          python docs/build_unified.py
          sphinx-build -b html docs/source docs/_build/html

      - name: Link Checker on built documentation
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          # Check the built HTML files recursively (includes internal links)
          args: --config lychee.toml --verbose --no-progress --max-redirects 10 'docs/_build/html/**/*.html'
          fail: true
